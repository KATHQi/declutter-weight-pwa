<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Weight" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>Home Weight Ledger</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Declutter Mass Log</p>
        <h1>Home Weight Ledger</h1>
      </div>
      <button id="storageBtn" class="ghost-button" type="button">检查存储</button>
    </header>

    <section class="summary-grid" aria-label="重量汇总">
      <article class="summary-card">
        <span>今日净减少</span>
        <strong id="todayNet">0.00 kg</strong>
      </article>

      <article class="summary-card">
        <span>累计净减少</span>
        <strong id="totalNet">0.00 kg</strong>
      </article>

      <article class="summary-card">
        <span>今日离开家</span>
        <strong id="todayOutgoing">0.00 kg</strong>
      </article>

      <article class="summary-card">
        <span>今日带回家</span>
        <strong id="todayIncoming">0.00 kg</strong>
      </article>
    </section>

    <section class="panel">
      <h2>新增记录</h2>

      <div class="segmented" role="group" aria-label="方向">
        <button id="outgoingBtn" class="segment active" type="button" data-direction="outgoing">离开家</button>
        <button id="incomingBtn" class="segment" type="button" data-direction="incoming">带回家</button>
      </div>

      <form id="entryForm" class="entry-form">
        <label>
          重量 kg
          <input id="weight" name="weight" inputmode="decimal" type="number" step="0.01" min="0" placeholder="例如 1.25" required />
        </label>

        <label>
          类别
          <select id="category" name="category">
            <option value="厨房">厨房</option>
            <option value="衣服">衣服</option>
            <option value="书">书</option>
            <option value="电子">电子</option>
            <option value="纸类">纸类</option>
            <option value="杂物">杂物</option>
            <option value="食物/包装">食物/包装</option>
            <option value="其他">其他</option>
          </select>
        </label>

        <label>
          备注
          <input id="note" name="note" type="text" maxlength="120" placeholder="可选，例如：旧书一袋" />
        </label>

        <button class="primary-button" type="submit">记录</button>
      </form>
    </section>

    <section class="panel">
      <div class="section-title-row">
        <h2>最近记录</h2>
        <button id="refreshBtn" class="ghost-button" type="button">刷新</button>
      </div>
      <ul id="entryList" class="entry-list" aria-live="polite"></ul>
      <p id="emptyState" class="empty-state">暂无记录。先记录一件离开家的物品。</p>
    </section>

    <footer class="app-footer">
      <p>
        数据保存在本机浏览器 IndexedDB。不要清理 Safari 网站数据；更换域名会对应另一个本地数据库。
      </p>
    </footer>
  </main>

  <dialog id="storageDialog">
    <h2>本地存储状态</h2>
    <p id="storageStatus">正在检查……</p>
    <button id="closeDialogBtn" class="primary-button" type="button">知道了</button>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
